<script>
    const arts = [
        {
            img: "Screenshot_9.png", 
            title: "Прототип родителей Шарптанг", 
            authorName: "Star Harlen",
            authorUrl: "https://google.com", 
            desc: "30.03.2026, 02:14"
        },
        {
            img: "Screenshot_10.png", 
            title: "Прототип родителей Прауда", 
            authorName: "Star Harlen",
            authorUrl: "https://google.com", 
            desc: "30.03.2026, 01:17"
        },
        {
            img: "Screenshot_10.png", 
            title: "Набросок дизайна матери Мунстрайк", 
            authorName: "Star Harlen",
            authorUrl: "https://google.com", 
            desc: "30.03.2026, 00:25"
        },
        {
            img: "Screenshot_10.png", 
            title: "Прототип родителей Прауда", 
            authorName: "Star Harlen",
            authorUrl: "https://google.com", 
            desc: "30.03.2026, 01:17"
        },
        {
            img: "Screenshot_10.png", 
            title: "Прототип родителей Прауда", 
            authorName: "Star Harlen",
            authorUrl: "https://google.com", 
            desc: "30.03.2026, 01:17"
        }
    ];

    let currentImgIndex = 0;
    let activeAuthorFilter = 'Все';

    const galleryGrid = document.getElementById('galleryGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const searchInput = document.getElementById('searchInput');
    const filterTags = document.getElementById('filterTags');
    const searchStats = document.getElementById('searchStats');

    // Генерируем карточки галереи
    function initGallery() {
        galleryGrid.innerHTML = '';
        arts.forEach((art, index) => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            // Записываем индекс напрямую для надежности фильтрации
            item.dataset.index = index; 
            item.innerHTML = `
                <div class="img-container" onclick="openLightbox(${index})">
                    <img src="${art.img}" alt="${art.title}" oncontextmenu="return false;" ondragstart="return false;">
                </div>
                <div class="item-info">
                    <h3>${art.title}</h3>
                    <a href="${art.authorUrl}" target="_blank" class="author-link">Автор: ${art.authorName}</a>
                    <p>${art.desc}</p>
                </div>
            `;
            galleryGrid.appendChild(item);
        });
        
        // Создаем кнопки фильтрации
        const authors = ['Все', ...new Set(arts.map(art => art.authorName))];
        filterTags.innerHTML = '';
        authors.forEach(author => {
            const btn = document.createElement('button');
            btn.className = `tag-btn ${author === activeAuthorFilter ? 'active' : ''}`;
            btn.textContent = author;
            btn.onclick = () => filterByAuthor(author);
            filterTags.appendChild(btn);
        });
        updateStats(arts.length);
    }

    // Исправленная логика фильтрации (работает стабильно)
    function filterArts() {
        const query = searchInput.value.toLowerCase().trim();
        const items = galleryGrid.getElementsByClassName('gallery-item');
        let visibleCount = 0;

        Array.from(items).forEach(item => {
            const index = parseInt(item.dataset.index);
            const art = arts[index];
            
            const matchesSearch = art.title.toLowerCase().includes(query) || 
                                  art.authorName.toLowerCase().includes(query) || 
                                  art.desc.toLowerCase().includes(query);
                                  
            const matchesAuthor = activeAuthorFilter === 'Все' || art.authorName === activeAuthorFilter;

            if (matchesSearch && matchesAuthor) {
                item.classList.remove('hidden');
                visibleCount++;
            } else {
                item.classList.add('hidden');
            }
        });

        updateStats(visibleCount);
    }

    function filterByAuthor(author) {
        activeAuthorFilter = author;
        document.querySelectorAll('.tag-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === author);
        });
        filterArts();
    }

    function updateStats(count) {
        searchStats.textContent = `Найдено артов: ${count}`;
    }

    // Управление Лайтбоксом
    function openLightbox(index) {
        currentImgIndex = index;
        const art = arts[index];
        
        lightboxImg.src = art.img;
        lightboxCaption.innerHTML = `
            <h3>${art.title}</h3>
            <a href="${art.authorUrl}" target="_blank">Автор: ${art.authorName}</a>
            <p>${art.desc}</p>
        `;
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
    }

    function handleLightboxClick(event) {
        if (event.target === lightbox || event.target.classList.contains('lightbox-protect-overlay')) {
            closeLightbox();
        }
    }

    function changeImage(direction) {
        const visibleItems = Array.from(galleryGrid.getElementsByClassName('gallery-item'))
                                  .filter(item => !item.classList.contains('hidden'));
        
        if (visibleItems.length === 0) return;

        let currentVisibleIndex = visibleItems.findIndex(item => parseInt(item.dataset.index) === currentImgIndex);
        currentVisibleIndex = (currentVisibleIndex + direction + visibleItems.length) % visibleItems.length;
        const nextRealIndex = parseInt(visibleItems[currentVisibleIndex].dataset.index);
        
        lightboxImg.style.transform = 'scale(0.95)';
        setTimeout(() => {
            openLightbox(nextRealIndex);
            lightboxImg.style.transform = 'scale(1)';
        }, 100);
    }

    // Слушатели событий
    searchInput.addEventListener('input', filterArts);

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') changeImage(-1);
        if (e.key === 'ArrowRight') changeImage(1);
    });

    // Запуск
    initGallery();
</script>
